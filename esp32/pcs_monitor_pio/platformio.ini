; PlatformIO Project Configuration File
; https://docs.platformio.org/page/projectconf.html

[common]
build_flags =
	-DCORE_DEBUG_LEVEL=3
	-Wall
	-Wextra

[libs_mqtt]
lib_deps =
	bblanchon/ArduinoJson@^7.2.2
	knolleary/PubSubClient@^2.8

[libs_display]
lib_deps =
	adafruit/Adafruit ST7735 and ST7789 Library@^1.11.0
	adafruit/Adafruit GFX Library@^1.12.6

; ── Firmware target: ESP32 dev board ─────────────────────────────────────────
[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
build_flags = ${common.build_flags}
lib_deps =
	${libs_mqtt.lib_deps}
	${libs_display.lib_deps}

; ── Hardware sketches ─────────────────────────────────────────────────────────

[env:test_tb]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
build_src_filter = -<*> +<../sketches/test_tb/>
build_flags = ${common.build_flags}
lib_deps =
    ${libs_mqtt.lib_deps}
    ${libs_display.lib_deps}

