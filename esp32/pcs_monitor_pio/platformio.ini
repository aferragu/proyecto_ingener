; =============================================================================
; pcs_monitor — PlatformIO project configuration
; =============================================================================
; Target board: ESP32 NodeMCU (change board to ttgo-lora32-v1 etc. if needed)
; Framework: Arduino
;
; Usage:
;   pio run -e esp32dev          # compile firmware
;   pio run -e esp32dev -t upload # flash to device
;   pio device monitor           # serial monitor 115200
;   pio test -e native           # run unit tests on host (no hardware needed)
; =============================================================================

; ── Shared library dependencies ─────────────────────────────────────────────
[libraries]
pubsubclient = knolleary/PubSubClient @ ^2.8
arduinojson  = bblanchon/ArduinoJson  @ ^6.21

; ── Shared build flags ───────────────────────────────────────────────────────
[common]
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -Wall
    -Wextra

; ── Firmware target: ESP32 dev board ─────────────────────────────────────────
[env:esp32dev]
platform      = espressif32
board         = esp32dev
framework     = arduino
monitor_speed = 115200
upload_speed  = 921600

lib_deps =
    ${libraries.pubsubclient}
    ${libraries.arduinojson}

build_flags =
    ${common.build_flags}

; ── Hardware sketches — flash individually to test subsystems ────────────────
; Usage: pio run -e test_mqtt -t upload && pio device monitor

[env:test_dashboard]
platform      = espressif32
board         = esp32dev
framework     = arduino
monitor_speed = 115200
upload_speed  = 921600
src_dir       = sketches/test_dashboard
lib_deps =
    ${libraries.pubsubclient}
    ${libraries.arduinojson}
build_flags   = ${common.build_flags}

[env:test_mqtt]
platform      = espressif32
board         = esp32dev
framework     = arduino
monitor_speed = 115200
upload_speed  = 921600
src_dir       = sketches/test_mqtt
lib_deps =
    ${libraries.pubsubclient}
    ${libraries.arduinojson}
build_flags   = ${common.build_flags}

[env:test_display]
platform      = espressif32
board         = esp32dev
framework     = arduino
monitor_speed = 115200
upload_speed  = 921600
src_dir       = sketches/test_display
lib_deps =
    adafruit/Adafruit ST7789 @ ^1.3
    adafruit/Adafruit GFX Library @ ^1.11
build_flags   = ${common.build_flags}

[env:test_modbus_hw]
platform      = espressif32
board         = esp32dev
framework     = arduino
monitor_speed = 115200
upload_speed  = 921600
src_dir       = sketches/test_modbus_hw
build_flags   = ${common.build_flags}

[env:test_can_hw]
platform      = espressif32
board         = esp32dev
framework     = arduino
monitor_speed = 115200
upload_speed  = 921600
src_dir       = sketches/test_can_hw
build_flags   = ${common.build_flags}

; ── Native target: host unit tests (no hardware required) ────────────────────
[env:native]
platform = native

lib_deps =
    ${libraries.arduinojson}

build_flags =
    ${common.build_flags}
    -DNATIVE_TEST          ; guards out Arduino/ESP32 specific headers in tested code
    -std=c++14

test_filter = test_*
